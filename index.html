<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="left">
        <img src="images/astro.svg" alt="" />
        <h2>
          Welcome aboard my <br />
          friend
        </h2>
        <h4>just a couple of clicks and we start</h4>
      </div>
      <div class="right">
        <h3>Welcome</h3>
        <div class="email">
          <img src="images/email.svg" alt="" />
          <input type="email" name="" id="" placeholder="Email" />
        </div>
        <div class="password">
          <img src="images/password.svg" alt="" />
          <input type="password" name="" id="" placeholder="Password" />
        </div>
        <a href="">Forgot Password?</a>
        <button class="login">Log in</button>
        <div class="account">
          <button><img src="images/google.svg" alt="" /> Google</button>
          <button><img src="images/gitlab.svg" alt="" /> Gitlab</button>
        </div>
        <p>Have no account yet?</p>
        <button class="register">Registration</button>
      </div>
    </div>
  </body>
</html>
